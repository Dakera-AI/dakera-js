name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, linux, arm64]

    strategy:
      matrix:
        node-version: ["22"]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: [test]
    services:
      dakera:
        image: ghcr.io/dakera-ai/dakera:latest
        ports:
          - 3300:3000
        env:
          DAKERA_AUTH_ENABLED: "true"
          DAKERA_ROOT_API_KEY: test-key
        options: >-
          --health-cmd "curl -f http://127.0.0.1:3000/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Wait for Dakera to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3300/health; then
              echo "Dakera is ready"
              break
            fi
            echo "Waiting for Dakera... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        env:
          DAKERA_TEST_URL: http://localhost:3300
          DAKERA_API_KEY: test-key
        run: npx vitest run src/integration.test.ts

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: [test]
    services:
      dakera:
        image: ghcr.io/dakera-ai/dakera:latest
        ports:
          - 3300:3000
        env:
          DAKERA_AUTH_ENABLED: "true"
          DAKERA_ROOT_API_KEY: test-key
        options: >-
          --health-cmd "curl -f http://127.0.0.1:3000/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Wait for Dakera to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3300/health; then
              echo "Dakera is ready"
              break
            fi
            echo "Waiting for Dakera... ($i/30)"
            sleep 2
          done

      - name: Run examples
        env:
          DAKERA_API_URL: http://localhost:3300
          DAKERA_API_KEY: test-key
        run: |
          npx tsx examples/basic.ts
          npx tsx examples/advanced.ts
          npx tsx examples/memory.ts
