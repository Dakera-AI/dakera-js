name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, linux, arm64]

    strategy:
      matrix:
        # Full matrix on PRs labeled 'full-matrix'; default: LTS only (saves ~50% CI minutes)
        node-version: ${{ contains(github.event.pull_request.labels.*.name, 'full-matrix') && fromJson('[20,22]') || fromJson('[22]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
